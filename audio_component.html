<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; font-family: sans-serif; background:#111; color:#eee; }
  #enable {
    width:100%; padding:14px; font-size:16px; background:#ff6600;
    color:#fff; border:none; cursor:pointer; border-radius:6px;
  }
  #enable:active { background:#cc5200; }
  #status { font-size:11px; padding:6px; color:#888; }
</style>
</head>
<body>
<button id="enable">🔊 Enable Audio + Haptics (tap here)</button>
<div id="status">waiting for user gesture…</div>

<script>
(() => {
  const POLL_MS          = 100;
  const SMOOTH           = 0.06;   // setTargetAtTime time-constant (seconds)
  const VOICE_GAINS      = [0.38, 0.26, 0.18];
  const MASTER_GAIN      = 0.4;
  const ACTIVE_MIN       = 0.40;   // zones below this proximity stay silent (~3m+)
  const DANGER_HZ        = 1800;
  const DANGER_GAIN      = 0.3;
  const DANGER_COOLDOWN_MS = 600;

  const QRNG_URL = 'https://qrng.anu.edu.au/API/jsonI.php?length=8&type=uint8';
  const QRNG_REFRESH_MS = 4000;  // fetch new quantum values every 4 seconds

  let ctx = null;
  let master, compressor;
  let voices = [];   // [{osc, gain, pan}] x3
  let dangerOsc, dangerGain;
  let lastDanger = 0;

  let quantumSeeds = new Float32Array(8).fill(0);  // fallback: all zeros = no wobble
  let quantumEnabled = false;
  let lastQrngFetch = 0;

  const statusEl = document.getElementById('status');

  function proximityToHz(p) {
    return 100 + p * 1100;   // 0.0 -> 100Hz, 1.0 -> 1200Hz
  }

  function zoneToPan(zone) {
    if (zone === "left")  return -0.85;
    if (zone === "right") return  0.85;
    return 0;  // center
  }

  async function fetchQuantumSeeds() {
    try {
      const r = await fetch(QRNG_URL, { cache: 'no-store' });
      if (r.ok) {
        const data = await r.json();
        // Normalize 0-255 to -1.0 to +1.0
        quantumSeeds = new Float32Array(
          data.data.map(v => (v / 127.5) - 1.0)
        );
      }
    } catch (e) {
      // API unreachable — silently keep last known seeds (or zeros on first call)
    }
  }

  function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    // Output chain: compressor -> master gain -> destination
    compressor = ctx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value      = 6;
    compressor.ratio.value     = 4;
    compressor.attack.value    = 0.003;
    compressor.release.value   = 0.25;

    master = ctx.createGain();
    master.gain.value = MASTER_GAIN;

    compressor.connect(master).connect(ctx.destination);

    // 3 continuous voices: osc -> gain -> StereoPanner -> compressor
    for (let i = 0; i < 3; i++) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      const pan  = ctx.createStereoPanner();
      osc.type = i === 0 ? 'triangle' : 'sine';
      osc.frequency.value = 100;
      gain.gain.value = 0;
      pan.pan.value = 0;
      osc.connect(gain).connect(pan).connect(compressor);
      osc.start();
      voices.push({ osc, gain, pan });
    }

    // Danger click (square), unpanned, routed directly to compressor
    dangerOsc  = ctx.createOscillator();
    dangerGain = ctx.createGain();
    dangerOsc.type = 'square';
    dangerOsc.frequency.value = DANGER_HZ;
    dangerGain.gain.value = 0;
    dangerOsc.connect(dangerGain).connect(compressor);
    dangerOsc.start();
  }

  function fireDanger() {
    const now = performance.now();
    if (now - lastDanger < DANGER_COOLDOWN_MS) return;
    lastDanger = now;

    const t = ctx.currentTime;
    dangerGain.gain.cancelScheduledValues(t);
    dangerGain.gain.setValueAtTime(0.0, t);
    dangerGain.gain.linearRampToValueAtTime(DANGER_GAIN, t + 0.005);
    dangerGain.gain.linearRampToValueAtTime(0.0, t + 0.055);

    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }

  function applyScene(zones) {
    const t = ctx.currentTime;

    // Only sonify zones above threshold; already sorted by proximity desc.
    const active = zones.filter(z => z.proximity > ACTIVE_MIN).slice(0, 3);
    let danger = false;

    for (let i = 0; i < 3; i++) {
      const v = voices[i];
      const z = active[i];
      if (z) {
        const baseHz = proximityToHz(z.proximity);
        const wobble = quantumEnabled ? quantumSeeds[i % 8] * 15 : 0;
        v.osc.frequency.setTargetAtTime(baseHz + wobble, t, SMOOTH);
        v.pan.pan.setTargetAtTime(zoneToPan(z.zone), t, SMOOTH);
        v.gain.gain.setTargetAtTime(VOICE_GAINS[i], t, SMOOTH);
        if (z.danger) danger = true;
      } else {
        v.gain.gain.setTargetAtTime(0, t, SMOOTH);
      }
    }

    if (danger) fireDanger();

    const parts = active
      .map(z => `${z.label || z.zone}-${z.level}@${z.distance_m.toFixed(1)}m`)
      .join('  ');
    const qLabel = quantumEnabled
      ? (quantumSeeds.some(v => v !== 0) ? '⚛️ quantum' : '⚛️ fetching…')
      : '';
    statusEl.textContent = `active: ${active.length}/6 | ${parts}  ${qLabel}`;
  }

  async function poll() {
    try {
      const r = await fetch('/app/static/scene.json?_=' + Date.now(),
                            { cache: 'no-store' });
      if (r.ok) {
        const data = await r.json();
        quantumEnabled = !!data.quantum;
        if (quantumEnabled && Date.now() - lastQrngFetch > QRNG_REFRESH_MS) {
          lastQrngFetch = Date.now();
          fetchQuantumSeeds();  // fire and forget
        }
        applyScene(data.objects || []);
      }
    } catch (e) {
      // file may not exist yet — ignore
    }
  }

  document.getElementById('enable').addEventListener('click', async () => {
    if (!ctx) initAudio();
    await ctx.resume();
    if (navigator.vibrate) navigator.vibrate(50);
    document.getElementById('enable').textContent = '✓ Audio active';
    document.getElementById('enable').style.background = '#2a7a2a';
    statusEl.textContent = 'polling…';
    setInterval(poll, POLL_MS);
  });
})();
</script>
</body>
</html>
